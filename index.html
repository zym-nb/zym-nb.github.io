<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>连板天梯 Pro Max</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#0b1220;
  font-family:Arial;
  color:#fff;
}
.container{padding:15px;}
textarea{
  width:100%;
  height:150px;
  border-radius:10px;
  padding:10px;
}
button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-size:16px;
}
.gen{background:#22c55e;}
.img{background:#3b82f6;color:#fff;}
.poster{
  margin-top:15px;
  background:#111827;
  padding:15px;
  border-radius:15px;
}
.header{
  text-align:center;
  font-size:20px;
  margin-bottom:10px;
}
.board{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}
.lv5{background:#dc2626;}
.lv4{background:#ea580c;}
.lv3{background:#ca8a04;}
.lv2{background:#16a34a;}
.lv1{background:#2563eb;}
.item{margin:3px 0;font-size:13px;}
.time{opacity:0.7;margin-right:5px;}
.tag{opacity:0.7;margin-left:5px;font-size:12px;}
</style>

</head>

<body>

<div class="container">

<h3>🚀 连板天梯 Pro Max</h3>

<textarea id="input" placeholder="直接粘贴你的完整数据（不用整理）"></textarea>

<button class="gen" onclick="run()">生成海报</button>
<button class="img" onclick="saveImg()">导出图片</button>

<div id="poster"></div>

</div>

<script>
function parse(line){
  let time = (line.match(/\d{2}:\d{2}/)||[""])[0];
  let name = line.split(" ")[1] || line;
  let tag = line.split(" ").slice(2).join(" ");
  return {time,name,tag,line};
}

function run(){
  let lines = document.getElementById("input").value.split("\n");

  let data={5:[],4:[],3:[],2:[],1:[]};

  lines.forEach(l=>{
    if(l.includes("5板")) data[5].push(parse(l));
    else if(l.includes("4板")) data[4].push(parse(l));
    else if(l.includes("3板")) data[3].push(parse(l));
    else if(l.includes("2板")) data[2].push(parse(l));
    else if(l.trim()!="") data[1].push(parse(l));
  });

  function render(arr,title,cls){
    if(arr.length==0) return "";
    let html=`<div class="board ${cls}">
    <b>${title} (${arr.length})</b>`;
    arr.forEach(i=>{
      html+=`<div class="item">
      <span class="time">${i.time}</span>
      ${i.line}
      </div>`;
    });
    html+="</div>";
    return html;
  }

  let html=`<div class="poster" id="posterArea">
  <div class="header">连板天梯</div>`;

  html+=render(data[5],"🔥5板","lv5");
  html+=render(data[4],"4板","lv4");
  html+=render(data[3],"3板","lv3");
  html+=render(data[2],"2板","lv2");
  html+=render(data[1],"首板","lv1");

  html+="</div>";

  document.getElementById("poster").innerHTML=html;
}

function saveImg(){
  html2canvas(document.querySelector("#posterArea")).then(canvas=>{
    let a=document.createElement("a");
    a.download="连板天梯.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}
</script>

</body>
</html>
