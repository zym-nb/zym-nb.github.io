<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>连板天梯·终极版</title>

<style>
body{font-family:Arial;padding:10px;}
textarea{width:100%;height:120px;}
button{width:100%;margin-top:8px;padding:12px;}
canvas{width:100%;margin-top:10px;}
</style>
</head>

<body>

<h3>🚀 连板天梯终极版</h3>

<textarea id="input" placeholder="格式：时间 名字 板块"></textarea>

<button onclick="draw()">生成海报</button>
<button onclick="save()">保存图片</button>

<canvas id="cvs" width="1080" height="1920"></canvas>

<script>
function parse(line){
  let p=line.split(" ");
  return {
    time:p[0]||"",
    name:p[1]||"",
    tag:p[2]||""
  }
}

function draw(){

  let ctx=document.getElementById("cvs").getContext("2d");

  // 背景
  ctx.fillStyle="#ffffff";
  ctx.fillRect(0,0,1080,1920);

  // 红框
  ctx.strokeStyle="#d60000";
  ctx.lineWidth=20;
  ctx.strokeRect(20,20,1040,1880);

  // 标题
  ctx.fillStyle="#d60000";
  ctx.font="bold 80px Arial";
  ctx.textAlign="center";
  ctx.fillText("连板天梯",540,120);

  let lines=document.getElementById("input").value.split("\n");

  let data={5:[],4:[],3:[],2:[],1:[]};

  lines.forEach(l=>{
    if(l.includes("5板")) data[5].push(parse(l));
    else if(l.includes("4板")) data[4].push(parse(l));
    else if(l.includes("3板")) data[3].push(parse(l));
    else if(l.includes("2板")) data[2].push(parse(l));
    else if(l.trim()!="") data[1].push(parse(l));
  });

  let y=200;

  function drawRow(arr,title){

    if(arr.length==0) return;

    // 左红块
    ctx.fillStyle="#d60000";
    ctx.fillRect(40,y,120,80);

    ctx.fillStyle="#fff";
    ctx.font="bold 40px Arial";
    ctx.fillText(title,100,y+50);

    let x=180;

    arr.forEach((i,index)=>{

      let col=index%5;
      let row=Math.floor(index/5);

      let bx=180+col*170;
      let by=y+row*90;

      ctx.fillStyle="#000";
      ctx.font="24px Arial";
      ctx.fillText(i.time,bx,by+20);

      ctx.font="bold 26px Arial";
      ctx.fillText(i.name,bx,by+45);

      ctx.fillStyle="#d60000";
      ctx.font="20px Arial";
      ctx.fillText(i.tag,bx,by+70);
    });

    y+=Math.ceil(arr.length/5)*90+20;
  }

  drawRow(data[5],"5板");
  drawRow(data[4],"4板");
  drawRow(data[3],"3板");
  drawRow(data[2],"2板");
  drawRow(data[1],"首板");

}

function save(){
  let cvs=document.getElementById("cvs");
  let a=document.createElement("a");
  a.download="连板天梯.png";
  a.href=cvs.toDataURL();
  a.click();
}
</script>

</body>
</html>
