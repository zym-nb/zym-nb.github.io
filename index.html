<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>连板天梯·海报版</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#eee;
  font-family: "Microsoft YaHei";
}

/* ===== 输入区 ===== */
.panel{
  padding:15px;
}
textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
}
button{
  width:100%;
  margin-top:8px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
}
.gen{background:#22c55e;}
.img{background:#3b82f6;color:#fff;}

/* ===== 海报主体 ===== */
.poster{
  width:360px;
  margin:20px auto;
  background:#fff;
  border:10px solid #e60000;
  border-radius:20px;
  padding:10px;
}

/* 标题 */
.title{
  text-align:center;
  color:#e60000;
  font-size:28px;
  font-weight:bold;
}
.sub{
  text-align:center;
  color:#e60000;
  margin-bottom:10px;
}

/* 指数 */
.info{
  background:#f5f5f5;
  border-radius:10px;
  padding:8px;
  font-size:12px;
  margin-bottom:10px;
}

/* 每一层 */
.row{
  display:flex;
  margin-bottom:6px;
}

/* 左侧板块 */
.left{
  width:60px;
  background:#e60000;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  border-radius:6px;
}

/* 右侧内容 */
.right{
  flex:1;
  background:#fafafa;
  padding:5px;
  border-radius:6px;
  display:flex;
  flex-wrap:wrap;
}

/* 单个股票 */
.item{
  width:25%;
  font-size:10px;
  text-align:center;
  margin-bottom:5px;
}

.name{font-weight:bold;}
.time{color:#888;}

.footer{
  font-size:10px;
  text-align:center;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="panel">
<textarea id="input" placeholder="直接粘贴你的数据"></textarea>
<button class="gen" onclick="run()">生成海报</button>
<button class="img" onclick="save()">导出图片</button>
</div>

<div id="poster"></div>

<script>

function parse(line){
  let time = (line.match(/\d{2}:\d{2}/)||[""])[0];
  let name = line.split(" ")[1]||line;
  return {time,name};
}

function run(){
  let lines = document.getElementById("input").value.split("\n");

  let data={5:[],4:[],3:[],2:[],1:[]};

  lines.forEach(l=>{
    if(l.includes("5板")) data[5].push(parse(l));
    else if(l.includes("4板")) data[4].push(parse(l));
    else if(l.includes("3板")) data[3].push(parse(l));
    else if(l.includes("2板")) data[2].push(parse(l));
    else if(l.trim()!="") data[1].push(parse(l));
  });

  function render(arr,title){
    if(arr.length==0) return "";
    let html=`<div class="row">
    <div class="left">${title}</div>
    <div class="right">`;

    arr.forEach(i=>{
      html+=`
      <div class="item">
        <div class="time">${i.time}</div>
        <div class="name">${i.name}</div>
      </div>`;
    });

    html+="</div></div>";
    return html;
  }

  let html=`
  <div class="poster" id="posterArea">
    <div class="title">连板天梯</div>
    <div class="sub">（自动生成）</div>

    <div class="info">
      示例：指数/成交额/封板率（可后续自动化）
    </div>

    ${render(data[5],"5板")}
    ${render(data[4],"4板")}
    ${render(data[3],"3板")}
    ${render(data[2],"2板")}
    ${render(data[1],"首板")}

    <div class="footer">
      数据来源：自动生成
    </div>
  </div>
  `;

  document.getElementById("poster").innerHTML=html;
}

function save(){
  html2canvas(document.querySelector("#posterArea")).then(canvas=>{
    let a=document.createElement("a");
    a.download="连板天梯.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}

</script>

</body>
</html>
